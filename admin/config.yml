backend:
  name: git-gateway
  branch: main

media_folder: "assets/img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "testimonials"
    label: "Testimonials"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Patient Name", name: "name", widget: "string" }
      - { label: "Review", name: "body", widget: "text" }
      - { label: "Photo", name: "image", widget: "image", required: false }

  - name: "gallery"
    label: "Gallery"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }